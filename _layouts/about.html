---
layout: default
---
<div class="about-page-wrapper" style="background: var(--bg-color); min-height: 80vh; padding: 60px 0;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-xl-9">
                <div class="about-header text-center mb-5">
                    <h1 class="display-4 fw-bold" style="color: var(--text-color); border-bottom: 2px solid #0366d6; display: inline-block; padding-bottom: 10px;">
                        {{ page.title }}
                    </h1>
                </div>

                <div class="about-content shadow-sm p-4 p-md-5 bg-white rounded border" style="
                    line-height: 1.8; 
                    font-size: 17px; 
                    color: #333;
                    text-align: left;
                ">
                    {{ content }}
                </div>

                <div class="text-center mt-5">
                    <a href="{{ '/' | relative_url }}" class="btn btn-primary px-4 py-2"> Quay về Trang chủ</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="readerControls" style="position: fixed; bottom: 30px; left: 20px; z-index: 1000;">
    <button class="btn btn-dark rounded-circle shadow" onclick="$('#menuSetting').toggle()" style="width: 50px; height: 50px;">⚙</button>
    <div id="menuSetting" class="bg-white p-3 shadow rounded" style="display:none; position:absolute; bottom:60px; width:200px; border:1px solid #ddd;">
        <label class="small fw-bold">Giao diện:</label>
        <div class="d-flex gap-2 mb-2">
            <button class="btn btn-sm btn-light border w-100" onclick="setTheme('light')">Sáng</button>
            <button class="btn btn-sm btn-dark w-100" onclick="setTheme('dark')">Tối</button>
        </div>
    </div>
</div>

<button id="backToTop" class="btn btn-secondary rounded-circle shadow" onclick="window.scrollTo({top:0, behavior:'smooth'})" style="position:fixed; bottom:30px; right:20px; display:none; width:50px; height:50px;">↑</button>

<style>
    /* Tối ưu hóa hiển thị Markdown trong trang About */
    .about-content h2 { margin-top: 30px; color: #0366d6; font-weight: 700; }
    .about-content h3 { margin-top: 25px; color: #555; }
    .about-content ul, .about-content ol { padding-left: 20px; }
    .about-content blockquote { 
        border-left: 5px solid #eee; 
        padding-left: 15px; 
        color: #666; 
        font-style: italic; 
    }
    .about-content img { max-width: 100%; border-radius: 8px; margin: 20px 0; }
    
    /* Hỗ trợ Dark Mode cho trang About */
    [data-theme="dark"] .about-content {
        background-color: #2d2d2d !important;
        color: #e0e0e0 !important;
        border-color: #444 !important;
    }
    [data-theme="dark"] .about-content h2 { color: #58a6ff; }
</style>

<script>
    // Logic Dark Mode cho trang About
    function setTheme(t){ document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t); }

    window.onload = () => {
        const t = localStorage.getItem('theme') || 'light'; setTheme(t);
        const s = localStorage.getItem('fSize'); if(s){ document.getElementById('book-content').style.fontSize = s+"%"; document.getElementById('font-val').innerText = s+"%"; }
        const p = localStorage.getItem('mark_'+pId); if(p) setTimeout(()=>window.scrollTo({top:p, behavior:'smooth'}), 500);
    };
    window.onscroll = () => { document.getElementById('backToTop').style.display = (window.scrollY > 300)? 'block':'none'; };
</script>
