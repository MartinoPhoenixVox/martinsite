---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
  </header>

  <div style="color: red; font-weight: bold; border: 2px solid red; padding: 10px; margin-bottom: 20px;">
    Hệ thống điều khiển cỡ chữ đang tải...
  </div>

  <div class="font-resizer" style="margin: 20px 0; padding: 15px; background: #FFEB3B; border: 2px solid #000; display: block !important; position: relative; z-index: 9999;">
    <b style="color: black;">Tùy chỉnh đọc sách: </b>
    <button onclick="changeFontSize('decrease')" style="padding: 10px 20px; cursor: pointer;">A- (Nhỏ)</button>
    <span id="current-size" style="margin: 0 15px; font-weight: bold; color: black;">100%</span>
    <button onclick="changeFontSize('increase')" style="padding: 10px 20px; cursor: pointer;">A+ (To)</button>
  </div>

  <hr>

  <div id="book-content" style="line-height: 1.8; transition: font-size 0.2s ease;">
    {{ content }}
  </div>
</article>

<script>
  function changeFontSize(action) {
    const contentDiv = document.getElementById('book-content');
    const sizeDisplay = document.getElementById('current-size');
    let currentZoom = parseInt(sizeDisplay.innerText);

    if (action === 'increase') currentZoom += 10;
    else if (action === 'decrease') currentZoom -= 10;

    if (currentZoom < 50) currentZoom = 50;
    if (currentZoom > 250) currentZoom = 250;

    contentDiv.style.fontSize = currentZoom + "%";
    sizeDisplay.innerText = currentZoom + "%";
  }
</script>
