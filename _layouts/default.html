<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Martinsite</title>
    <link rel="stylesheet" href="{{ '/css/all.min.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/bootstrap.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/table.css' | relative_url }}">
    {% if page.layout == 'post' %}
    <style>
        /* Thêm CSS hỗ trợ Dark Mode cho layout đọc sách */
        [data-theme="dark"] body { background-color: #1a1a1a !important; color: #e0e0e0 !important; }
        [data-theme="dark"] .top-bar, [data-theme="dark"] footer { background-color: #111 !important; }
        /* ============================================================
        FIX LỖI NÚT ĐỌC NGAY & HEADER TRÊN MOBILE
        ============================================================ */

        /* 1. Ép tất cả Card có cùng độ cao và nút nằm dưới đáy */
        .category-section .row {
            display: flex;
            flex-wrap: wrap;
        }

        .category-section .col-6 { /* Áp dụng cho layout 2 cột trên mobile */
            display: flex;
            margin-bottom: 20px;
        }

        .category-section .card {
            display: flex !important;
            flex-direction: column !important;
            width: 100%;
            height: 100%; /* Đảm bảo card luôn cao bằng nhau trong cùng 1 hàng */
            border-radius: 8px;
            overflow: hidden;
        }

        .category-section .card-body {
            display: flex !important;
            flex-direction: column !important;
            flex-grow: 1 !important; /* Chiếm hết khoảng trống còn lại */
            padding: 15px !important;
        }

        .category-section .card-title {
            font-size: 16px;
            margin-bottom: 8px;
            /* Giới hạn tiêu đề tối đa 2 dòng để không làm lệch khung */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 40px; 
        }

        .category-section .text-muted {
            font-size: 13px;
            margin-bottom: 20px !important; /* Tạo khoảng trống với nút */
            flex-grow: 1; /* CỰC KỲ QUAN TRỌNG: Đẩy nút bấm xuống đáy */
        }

        .category-section .btn-primary {
            margin-top: auto !important; /* Đảm bảo nút dính chặt đáy card-body */
            width: 100%;
            padding: 10px;
            font-weight: bold;
        }

        /* 2. Fix Header bị mất Menu trên Mobile */
        @media (max-width: 991px) {
            /* Hiển thị nút 3 gạch (Hamburger) */
            .navbar-toggler {
                border-color: rgba(0,0,0,0.1) !important;
                background-color: #f8f9fa !important; /* Tạo nền cho nút dễ thấy */
                display: block !important;
            }
            
            .navbar-toggler-icon {
                background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3_3Cpath stroke='rgba(0, 0, 0, 0.5)' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E") !important;
            }

            /* Đảm bảo Menu khi sổ ra không bị trong suốt */
            .navbar-collapse {
                background: #ffffff !important;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                z-index: 9999;
                padding: 20px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            }
            
            .nav-item .nav-link {
                color: #333 !important;
                padding: 10px 0 !important;
                border-bottom: 1px solid #eee;
            }
        }
    </style>
    {% endif %}
</head>
<body>
    <div class="top-bar" id="topbar">
        <div class="container">
            <div class="row">
                <div class="col-xl-4 top-left d-xl-block d-none"><p>Ad Majorem Dei Gloriam</p></div>
                <div class="col-xl-4 top-center"><p>Chào mừng bạn đến với Thư viện Martin!</p></div>
                <div class="col-xl-4 top-right d-xl-block d-none">
                    <ul><li><a href="{{ '/' | relative_url }}">Trang chủ</a></li><li><a href="{{ '/about/' | relative_url }}">Giới thiệu</a></li><li><a href="{{ '/thisproject/' | relative_url }}">Dự án</a></li></ul>
                </div>
            </div>
        </div>
    </div>

    <main>
        {{ content }}
    </main>

    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-lg-3 col-md-6 col-12 col-footer">
                    <h3 class="footer-title">Martinsite</h3>
                    <p class="footer-text">Thư viện sách của Martinô Võ Huỳnh Thanh Phương</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="{{ '/Js/jquery-3.7.1.min.js' | relative_url }}"></script>
    <script src="{{ '/Js/bootstrap.bundle.min.js' | relative_url }}"></script>
    <script src="{{ '/Js/script.js' | relative_url }}"></script>
</body>
</html>
