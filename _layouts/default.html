<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Novelty Library</title>
    <link rel="stylesheet" href="{{ '/css/all.min.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/bootstrap.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/table.css' | relative_url }}">
    {% if page.layout == 'post' %}
    <style>
        /* Thêm CSS hỗ trợ Dark Mode cho layout đọc sách */
        [data-theme="dark"] body { background-color: #1a1a1a !important; color: #e0e0e0 !important; }
        [data-theme="dark"] .top-bar, [data-theme="dark"] footer { background-color: #111 !important; }
        /* 1. Loại bỏ mọi khoảng trống mặc định của trình duyệt */
        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* 2. Ép Header và Top-bar không được có margin dưới */
        .top-bar, header, .navbar {
            margin-bottom: 0 !important;
            padding-bottom: 0 !important;
            border-bottom: none !important;
        }

        /* 3. Khử vạch trắng giữa header và main */
        main {
            display: block;
            margin-top: 0 !important;
            padding-top: 0 !important;
            background-color: var(--bg-color, #ffffff); /* Đảm bảo nền main trùng màu trang */
        }

        /* 4. Fix cho Novelty Theme: Khử border ẩn của navbar */
        .header-bottom, .menu-area {
            border: none !important;
            box-shadow: none !important;
        }
    </style>
    {% endif %}
</head>
<body>
    <div class="top-bar" id="topbar">
        <div class="container">
            <div class="row">
                <div class="col-xl-4 top-left d-xl-block d-none"><p>Hotline: <span>+1 285 225</span></p></div>
                <div class="col-xl-4 top-center"><p>Chào mừng bạn đến với Thư viện Martin!</p></div>
                <div class="col-xl-4 top-right d-xl-block d-none">
                    <ul><li><a href="{{ '/' | relative_url }}">Trang chủ</a></li></ul>
                    <ul><li><a href="{{ '/README.md' | relative_url }}">Giới thiệu</a></li></ul>
                </div>
            </div>
        </div>
    </div>

    <main>
        {{ content }}
    </main>

    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-lg-3 col-md-6 col-12 col-footer">
                    <h3 class="footer-title">Martinsite</h3>
                    <div class="col-xl-4 top-right d-xl-block d-none"><p>Ad Majorem Dei Gloriam</p></div>
                </div>
                </div>
        </div>
    </footer>

    <script src="{{ '/Js/jquery-3.7.1.min.js' | relative_url }}"></script>
    <script src="{{ '/Js/bootstrap.bundle.min.js' | relative_url }}"></script>
    <script src="{{ '/Js/script.js' | relative_url }}"></script>
</body>
</html>
