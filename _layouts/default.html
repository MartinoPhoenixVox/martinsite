<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Martinsite</title>
    <link rel="stylesheet" href="{{ '/css/all.min.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/bootstrap.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/table.css' | relative_url }}">
    {% if page.layout == 'post' %}
    <style>
        /* Thêm CSS hỗ trợ Dark Mode cho layout đọc sách */
        [data-theme="dark"] body { background-color: #1a1a1a !important; color: #e0e0e0 !important; }
        [data-theme="dark"] .top-bar, [data-theme="dark"] footer { background-color: #111 !important; }
        /* ============================================================
        SUPER FIX: NÚT ĐÍNH ĐÁY & HIỆN MENU MOBILE (NOVELTY THEME)
        ============================================================ */

        /* 1. Đảm bảo tất cả các cột chứa sách có độ cao bằng nhau */
        .category-section .row {
            display: flex !important;
            flex-wrap: wrap !important;
            align-items: stretch !important; /* Ép các cột dài bằng nhau */
        }

        /* 2. Cấu trúc lại Card để nút luôn dính đáy */
        .category-section .card {
            display: flex !important;
            flex-direction: column !important;
            height: 100% !important; /* Chiếm hết chiều cao cột */
            margin-bottom: 0 !important;
        }

        .category-section .card-body {
            display: flex !important;
            flex-direction: column !important;
            flex: 1 0 auto !important; /* Chiếm toàn bộ không gian còn lại */
            padding-bottom: 15px !important;
        }

        .category-section .card-title {
            flex-grow: 0 !important;
            min-height: 3em !important; /* Giữ chỗ cho tiêu đề 2 dòng */
        }

        .category-section .text-muted {
            flex-grow: 1 !important; /* ĐÂY LÀ KHÓA CHÍNH: Nó sẽ giãn ra để đẩy nút xuống */
            display: block !important;
            margin-bottom: 20px !important;
        }

        .category-section .btn-primary {
            margin-top: auto !important; /* Ép nút dính sát đáy card-body */
            align-self: center !important;
            width: 100% !important;
        }

        /* 3. Hiện Menu Header trên điện thoại */
        @media (max-width: 991px) {
            /* Đảm bảo nút 3 gạch (Hamburger) luôn có màu để nhìn thấy */
            .navbar-toggler {
                border-color: #333 !important;
                background-color: #f8f9fa !important;
                display: block !important;
            }
            
            .navbar-toggler-icon {
                background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3Base path fill='rgba(0, 0, 0, 0.5)' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E") !important;
            }

            /* Ép menu hiện ra khi bấm nút */
            .navbar-collapse.collapse.show {
                display: block !important;
                background-color: #ffffff !important;
                position: absolute !important;
                top: 100% !important;
                left: 0 !important;
                right: 0 !important;
                z-index: 10000 !important;
                padding: 20px !important;
                box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important;
                max-height: 80vh !important;
                overflow-y: auto !important;
            }

            /* Chỉnh màu chữ menu cho rõ ràng */
            .navbar-nav .nav-link {
                color: #333 !important;
                font-weight: 600 !important;
                padding: 12px 0 !important;
                border-bottom: 1px solid #eee !important;
            }
            
            /* Hiện các icon bên phải nếu bị ẩn */
            .header-right {
                display: flex !important;
            }
        }
    </style>
    {% endif %}
</head>
<body>
    <div class="top-bar" id="topbar">
        <div class="container">
            <div class="row">
                <div class="col-xl-4 top-left d-xl-block d-none"><p>Ad Majorem Dei Gloriam</p></div>
                <div class="col-xl-4 top-center"><p>Chào mừng bạn đến với Thư viện Martin!</p></div>
                <div class="col-xl-4 top-right d-xl-block d-none">
                    <ul><li><a href="{{ '/' | relative_url }}">Trang chủ</a></li><li><a href="{{ '/about/' | relative_url }}">Giới thiệu</a></li><li><a href="{{ '/thisproject/' | relative_url }}">Dự án</a></li></ul>
                </div>
            </div>
        </div>
    </div>

    <main>
        {{ content }}
    </main>

    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-lg-3 col-md-6 col-12 col-footer">
                    <h3 class="footer-title">Martinsite</h3>
                    <p class="footer-text">Thư viện sách của Martinô Võ Huỳnh Thanh Phương</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="{{ '/Js/jquery-3.7.1.min.js' | relative_url }}"></script>
    <script src="{{ '/Js/bootstrap.bundle.min.js' | relative_url }}"></script>
    <script src="{{ '/Js/script.js' | relative_url }}"></script>
</body>
</html>
