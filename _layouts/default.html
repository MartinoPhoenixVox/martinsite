<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Martinsite</title>
    <link rel="stylesheet" href="{{ '/css/all.min.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/bootstrap.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/table.css' | relative_url }}">
    {% if page.layout == 'post' %}
    <style>
        /* Thêm CSS hỗ trợ Dark Mode cho layout đọc sách */
        [data-theme="dark"] body { background-color: #1a1a1a !important; color: #e0e0e0 !important; }
        [data-theme="dark"] .top-bar, [data-theme="dark"] footer { background-color: #111 !important; }
        /* ============================================================
        FIX LỖI NÚT "ĐỌC NGAY" (FLEXBOX OVERRIDE)
        ============================================================ */

        /* Ép các cột chứa card phải có chiều cao bằng nhau */
        .category-section .row {
            display: flex !important;
            flex-wrap: wrap !important;
        }

        .category-section .col-6, 
        .category-section .col-md-4, 
        .category-section .col-lg-3 {
            display: flex !important;
            flex-direction: column !important;
            margin-bottom: 25px !important;
        }

        /* Ép thẻ card chiếm 100% chiều cao cột */
        .category-section .card {
            display: flex !important;
            flex-direction: column !important;
            height: 100% !important; 
            margin: 0 !important;
        }

        /* Ép thân card (body) phải dãn ra để chiếm không gian */
        .category-section .card-body {
            display: flex !important;
            flex-direction: column !important;
            flex: 1 0 auto !important; /* Dãn để chiếm hết chiều cao còn lại */
            padding: 15px !important;
            justify-content: flex-start !important;
        }

        /* Ép nội dung (title, author) không được đẩy nút đi sai chỗ */
        .category-section .card-title {
            min-height: 48px !important; /* Đảm bảo các dòng tiêu đề bằng nhau */
            margin-bottom: 10px !important;
        }

        .category-section .text-muted {
            margin-bottom: 20px !important;
            flex-grow: 1 !important; /* ĐÂY LÀ CHÌA KHÓA: Đẩy mọi thứ bên dưới nó xuống đáy */
        }

        /* Nút bấm dính sát đáy */
        .category-section .btn-primary {
            margin-top: auto !important; 
            width: 100% !important;
            display: block !important;
        }

        /* ============================================================
        FIX LỖI MENU TRÊN MOBILE (DISPLAY & Z-INDEX)
        ============================================================ */

        @media (max-width: 991px) {
            /* Ép thanh Menu hiện ra khi bấm nút Hamburger */
            .navbar-collapse.collapse.show {
                display: block !important;
                visibility: visible !important;
                background-color: #ffffff !important;
                position: absolute !important;
                top: 100% !important;
                left: 0 !important;
                width: 100% !important;
                z-index: 99999 !important;
                padding: 20px !important;
                box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important;
                border-top: 1px solid #eee !important;
            }

            /* Đảm bảo chữ menu không bị màu trắng (tàng hình) */
            .navbar-nav .nav-link {
                color: #222222 !important;
                font-weight: 500 !important;
                padding: 12px 0 !important;
                border-bottom: 1px solid #f0f0f0 !important;
                text-align: left !important;
            }

            /* Đảm bảo nút bấm (Toggle) luôn hiển thị */
            .navbar-toggler {
                border-color: #333 !important;
                outline: none !important;
            }
        }
    </style>
    {% endif %}
</head>
<body>
    <div class="top-bar" id="topbar">
        <div class="container">
            <div class="row">
                <div class="col-xl-4 top-left d-xl-block d-none"><p>Ad Majorem Dei Gloriam</p></div>
                <div class="col-xl-4 top-center"><p>Chào mừng bạn đến với Thư viện Martin!</p></div>
                <div class="col-xl-4 top-right d-xl-block d-none">
                    <ul><li><a href="{{ '/' | relative_url }}">Trang chủ</a></li><li><a href="{{ '/about/' | relative_url }}">Giới thiệu</a></li><li><a href="{{ '/thisproject/' | relative_url }}">Dự án</a></li></ul>
                </div>
            </div>
        </div>
    </div>

    <main>
        {{ content }}
    </main>

    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-lg-3 col-md-6 col-12 col-footer">
                    <h3 class="footer-title">Martinsite</h3>
                    <p class="footer-text">Thư viện sách của Martinô Võ Huỳnh Thanh Phương</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="{{ '/Js/jquery-3.7.1.min.js' | relative_url }}"></script>
    <script src="{{ '/Js/bootstrap.bundle.min.js' | relative_url }}"></script>
    <script src="{{ '/Js/script.js' | relative_url }}"></script>
</body>
</html>
