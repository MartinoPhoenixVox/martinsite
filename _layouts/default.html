<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Martinsite</title>
    <link rel="stylesheet" href="{{ '/css/all.min.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/bootstrap.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/table.css' | relative_url }}">
    {% if page.layout == 'post' %}
    <style>
        /* Thêm CSS hỗ trợ Dark Mode cho layout đọc sách */
        [data-theme="dark"] body { background-color: #1a1a1a !important; color: #e0e0e0 !important; }
        [data-theme="dark"] .top-bar, [data-theme="dark"] footer { background-color: #111 !important; }
        /* ÉP CÁC CỘT CÓ ĐỘ CAO BẰNG NHAU */
        .category-section .row {
            display: flex !important;
            flex-wrap: wrap !important;
        }

        .category-section [class*="col-"] {
            display: flex !important;
            flex-direction: column !important;
            margin-bottom: 30px !important;
        }

        /* ÉP CARD VÀ BODY CHIẾM HẾT CHIỀU CAO */
        .category-section .card {
            display: flex !important;
            flex-direction: column !important;
            flex: 1 1 auto !important;
            height: 100% !important;
            border: 1px solid #f0f0f0 !important;
        }

        .category-section .card-body {
            display: flex !important;
            flex-direction: column !important;
            flex: 1 1 auto !important;
            padding: 20px !important;
            text-align: center !important;
        }

        /* ĐẨY NÚT XUỐNG ĐÁY */
        .category-section .card-title {
            margin-bottom: 10px !important;
            flex-shrink: 0 !important;
        }

        .category-section .text-muted {
            flex-grow: 1 !important; /* Lấp đầy khoảng trống ở giữa */
            margin-bottom: 20px !important;
        }

        .category-section .btn-primary {
            margin-top: auto !important; /* Dính chặt vào đáy card-body */
            width: 100% !important;
            display: block !important;
        }
        @media (max-width: 991px) {
        /* Ép nút Hamburger hiển thị */
        .navbar-toggler {
            display: block !important;
            background-color: #f8f9fa !important;
            border: 1px solid #ddd !important;
            margin: 10px !important;
        }

        /* ÉP MENU PHẢI HIỆN RA KHI CÓ CLASS .show */
        .navbar-collapse.collapse.show {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            position: absolute !important;
            top: 100% !important;
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            background: #ffffff !important;
            z-index: 99999 !important;
            padding: 20px !important;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2) !important;
            border-top: 2px solid #0366d6 !important;
        }

        .navbar-nav {
            display: block !important;
            width: 100% !important;
        }

        .nav-item {
            width: 100% !important;
            border-bottom: 1px solid #eee !important;
        }

        .nav-link {
            color: #333 !important;
            padding: 15px !important;
            display: block !important;
        }
    }
    </style>
    {% endif %}
</head>
<body>
    <div class="top-bar" id="topbar">
        <div class="container">
            <div class="row">
                <div class="col-xl-4 top-left d-xl-block d-none"><p>Ad Majorem Dei Gloriam</p></div>
                <div class="col-xl-4 top-center"><p>Chào mừng bạn đến với Thư viện Martin!</p></div>
                <div class="col-xl-4 top-right d-xl-block d-none">
                    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
                        <div class="container">
                            <a class="navbar-brand fw-bold" href="{{ '/' | relative_url }}">Martinsite</a>

                            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#martinsiteNav" aria-controls="martinsiteNav" aria-expanded="false" aria-label="Toggle navigation">
                                <span class="navbar-toggler-icon"></span>
                            </button>

                            <div class="collapse navbar-collapse" id="martinsiteNav">
                                
                                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
                                    <li class="nav-item">
                                        <a class="nav-link active" href="{{ '/' | relative_url }}">Trang chủ</a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link" href="#">Giới thiệu</a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link" href="#">Dự án</a>
                                    </li>

                                    <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                                        <form class="d-flex" action="#" method="get">
                                            <input class="form-control form-control-sm me-2" type="search" id="headerSearchInput" placeholder="Tìm sách..." aria-label="Search">
                                            <button class="btn btn-sm btn-primary" type="submit">Tìm</button>
                                        </form>
                                    </li>
                                </ul>

                            </div>
                        </div>
                    </nav>
                    <div class="search-container mt-3 mb-4 text-center col-12 col-md-6 my-2">
                        <div class="input-group mx-auto" style="max-width: 600px;">
                            <input type="text" id="searchInput" class="form-control" placeholder="Tìm theo tên sách hoặc thẻ (ví dụ: sách thiêng liêng, đời sống thánh hiến,...)" onkeyup="liveSearch()">
                            <span class="input-group-text bg-primary text-white"><i class="fa fa-search"></i></span>
                        </div>
                        <div id="searchResults" class="list-group mt-2 shadow" style="max-width: 600px; margin: 0 auto; position: absolute; left: 0; right: 0; z-index: 2000; display: none; background: white;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <main>
        {{ content }}
    </main>

    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-lg-3 col-md-6 col-12 col-footer">
                    <h3 class="footer-title">Martinsite</h3>
                    <p class="footer-text">Thư viện sách của Martinô Võ Huỳnh Thanh Phương</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="{{ '/Js/jquery-3.7.1.min.js' | relative_url }}"></script>
    <script src="{{ '/Js/bootstrap.bundle.min.js' | relative_url }}"></script>
    <script src="{{ '/Js/script.js' | relative_url }}"></script>
    <script>
        let searchData = [];

        // 1. Tải dữ liệu từ file JSON đã tạo ở Bước 1
        fetch("{{ '/search_data.json' | relative_url }}")
            .then(response => response.json())
            .then(data => {
                searchData = data;
            });

        function liveSearch() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let resultsDiv = document.getElementById('searchResults');
            
            if (input.length < 1) {
                resultsDiv.style.display = 'none';
                return;
            }

            // 2. Lọc theo Title HOẶC Tags
            let filtered = searchData.filter(item => {
                return item.title.toLowerCase().includes(input) || 
                    (item.tags && item.tags.toLowerCase().includes(input)) || 
                    (item.author && item.author.toLowerCase().includes(input));
            });

            // 3. Hiển thị kết quả
            if (filtered.length > 0) {
                resultsDiv.innerHTML = filtered.map(item => `
                    <a href="${item.url}" class="list-group-item list-group-item-action text-start">
                        <div class="fw-bold">${item.title}</div>
                        <small class="text-muted">Tags: ${item.tags || 'Không có'}</small>
                    </a>
                `).join('');
                resultsDiv.style.display = 'block';
            } else {
                resultsDiv.innerHTML = '<div class="list-group-item text-muted">Không tìm thấy sách nào...</div>';
                resultsDiv.style.display = 'block';
            }
        }

        // Đóng kết quả khi click ra ngoài
        document.addEventListener('click', function(e) {
            if (e.target.id !== 'searchInput') {
                document.getElementById('searchResults').style.display = 'none';
            }
        });
    </script>
</body>
</html>
