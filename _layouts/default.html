<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Martinsite</title>
    <link rel="stylesheet" href="{{ '/css/all.min.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/bootstrap.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/table.css' | relative_url }}">
    {% if page.layout == 'post' %}
    <style>
        /* Thêm CSS hỗ trợ Dark Mode cho layout đọc sách */
        [data-theme="dark"] body { background-color: #1a1a1a !important; color: #e0e0e0 !important; }
        [data-theme="dark"] .top-bar, [data-theme="dark"] footer { background-color: #111 !important; }
        /* ============================================================
        FIX LỖI NÚT "ĐỌC NGAY" VÀ HEADER TRÊN MOBILE
        ============================================================ */

        /* 1. Ép các Card bằng chiều cao nhau và đẩy nút xuống đáy */
        .category-section .row {
            display: flex;
            flex-wrap: wrap;
        }

        .category-section .col-6, 
        .category-section .col-md-4, 
        .category-section .col-lg-3 {
            display: flex; /* Đảm bảo các cột có chiều cao bằng nhau */
            margin-bottom: 20px;
        }

        .category-section .card {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%; /* Ép card chiếm hết chiều cao cột */
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        .category-section .card-body {
            display: flex;
            flex-direction: column;
            flex: 1; /* Chiếm toàn bộ không gian còn trống */
            padding: 15px;
            text-align: center;
        }

        .category-section .card-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            min-height: 40px; /* Giữ chỗ cho tiêu đề để các card đều nhau */
        }

        .category-section .text-muted {
            font-size: 13px;
            margin-bottom: 15px !important;
            flex-grow: 1; /* CHIÊU QUAN TRỌNG: Đẩy nút bấm xuống đáy */
        }

        .category-section .btn-primary {
            margin-top: auto; /* Đảm bảo nút luôn dính đáy body */
            width: 100%;
            padding: 8px;
            font-weight: 600;
        }

        /* 2. Fix Header bị mất Menu trên Mobile */
        @media (max-width: 991px) {
            /* Hiển thị nút bấm menu (Hamburger) */
            .navbar-toggler {
                display: block !important;
                border-color: rgba(0,0,0,0.1);
            }

            /* Hiển thị menu khi xổ xuống */
            .navbar-collapse {
                background: #ffffff !important; /* Ép nền trắng để không bị tàng hình */
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                z-index: 9999;
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);
                padding: 15px;
                border-top: 1px solid #eee;
            }

            /* Màu chữ menu trên mobile */
            .navbar-nav .nav-link {
                color: #333 !important;
                padding: 10px 15px !important;
                border-bottom: 1px solid #f5f5f5;
            }

            /* Đảm bảo icon giỏ hàng/user không bị đè */
            .header-right {
                display: flex !important;
                align-items: center;
            }
        }
    </style>
    {% endif %}
</head>
<body>
    <div class="top-bar" id="topbar">
        <div class="container">
            <div class="row">
                <div class="col-xl-4 top-left d-xl-block d-none"><p>Ad Majorem Dei Gloriam</p></div>
                <div class="col-xl-4 top-center"><p>Chào mừng bạn đến với Thư viện Martin!</p></div>
                <div class="col-xl-4 top-right d-xl-block d-none">
                    <ul><li><a href="{{ '/' | relative_url }}">Trang chủ</a></li><li><a href="{{ '/about/' | relative_url }}">Giới thiệu</a></li><li><a href="{{ '/thisproject/' | relative_url }}">Dự án</a></li></ul>
                </div>
            </div>
        </div>
    </div>

    <main>
        {{ content }}
    </main>

    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-lg-3 col-md-6 col-12 col-footer">
                    <h3 class="footer-title">Martinsite</h3>
                    <p class="footer-text">Thư viện sách của Martinô Võ Huỳnh Thanh Phương</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="{{ '/Js/jquery-3.7.1.min.js' | relative_url }}"></script>
    <script src="{{ '/Js/bootstrap.bundle.min.js' | relative_url }}"></script>
    <script src="{{ '/Js/script.js' | relative_url }}"></script>
</body>
</html>
